<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>טיול טאטרה</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDEAE0; --surf:#FFF; --surf2:#F5F1E8;
  --line:#DDD8C8; --line2:#EAE5D8;
  --ink:#3C3526; --ink2:#6E6450; --ink3:#9C8F73;
  --amber:#C97B3C; --amber2:#F4E8D6;
  --green:#7A8B6F; --green2:#EAF0E2;
  --red:#B84040; --red2:#FBEAEA;
  --blue:#3D6E8F; --blue2:#E6F0F8;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);margin:0;padding:0;}
body{font-family:'Assistant',sans-serif;font-size:16px;line-height:1.6;}
.ft{font-family:'Rubik',sans-serif;}
.fm{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:embed;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}

/* CARDS */
.card{background:var(--surf);border:0.5px solid var(--line);border-radius:16px;padding:20px 18px;}
.card-sm{background:var(--surf);border:0.5px solid var(--line);border-radius:12px;padding:14px 14px;}
.inner{background:var(--surf2);border:0.5px solid var(--line2);border-radius:10px;padding:12px 14px;}

/* TABS */
.tab-act{background:var(--amber);color:#FFF;font-weight:700;}
.tab-off{color:var(--ink2);}
.mob-act .mi{color:var(--amber);}
.mob-act .ml{color:var(--amber);font-weight:700;}
.mob-off .mi{color:var(--ink3);}
.mob-off .ml{color:var(--ink3);}

/* DAY STRIP */
.day-chip{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:10px 14px;border-radius:12px;cursor:pointer;
  border:0.5px solid var(--line);background:var(--surf2);
  position:relative;transition:background .15s,border-color .15s;
  min-width:64px;
}
.day-chip.active{background:var(--surf);border-color:var(--amber);}
.day-chip.active::after{
  content:'';position:absolute;bottom:-1px;left:12px;right:12px;
  height:3px;background:var(--amber);border-radius:99px;
}
.day-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;color:var(--ink3);line-height:1;}
.day-chip.active .day-num{color:var(--amber);font-weight:700;}
.day-name{font-size:11px;color:var(--ink3);margin-top:3px;text-align:center;white-space:nowrap;}
.day-chip.active .day-name{color:var(--ink2);font-weight:600;}

/* CHECKBOX */
.chk{
  width:24px;height:24px;min-width:24px;border-radius:7px;
  border:1.5px solid var(--line);background:var(--surf2);
  transition:background .15s,border-color .15s;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.chk.on{background:var(--green);border-color:var(--green);}
.chk .tk{opacity:0;transform:scale(.4);transition:opacity .15s,transform .15s;}
.chk.on .tk{opacity:1;transform:scale(1);}
.strike{text-decoration:line-through;opacity:.4;}

/* PROGRESS */
.pt{background:var(--surf2);border-radius:99px;overflow:hidden;}
.pf{background:var(--green);height:100%;transition:width .4s;border-radius:99px;}

/* ALERTS */
.warn{background:var(--amber2);border:0.5px solid #E8C090;border-radius:12px;padding:14px 16px;}
.info{background:var(--blue2);border:0.5px solid #B8D4EA;border-radius:12px;padding:14px 16px;}
.attn{background:#FFF8EB;border:1.5px solid var(--amber);border-radius:12px;padding:14px 16px;}

/* EDIT MODE INDICATION */
body.global-edit-active [data-editable-field] {
  outline: 1.5px dashed var(--amber);
  outline-offset: 4px;
  background: rgba(201,123,60,.06);
  border-radius: 4px;
  cursor: text;
}
body.global-edit-active [data-editable-field]:focus {
  background: rgba(201,123,60,.12);
  outline: 2px solid var(--amber);
}
body.global-edit-active .edit-indicator {
  display: inline-flex !important;
}
body:not(.global-edit-active) .edit-indicator {
  display: none !important;
}

.edit-btn{display:flex;align-items:center;gap:6px;background:var(--surf2);border:0.5px solid var(--line);border-radius:8px;padding:6px 12px;font-family:'Assistant',sans-serif;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;transition:background .15s;}
.edit-btn:hover{background:var(--amber2);}
.edit-btn.active{background:var(--amber);color:#fff;border-color:var(--amber);}

/* ADD ROW */
.add-row{display:flex;gap:8px;margin-top:12px;}
.add-row input{flex:1;border:0.5px solid var(--line);border-radius:10px;padding:10px 14px;font-family:'Assistant',sans-serif;font-size:15px;background:var(--surf2);color:var(--ink);}
.add-row input::placeholder{color:var(--ink3);}
.add-row input:focus{outline:none;box-shadow:0 0 0 2px var(--amber);}
.add-row button,.abtn{background:var(--amber);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:'Assistant',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}

/* DELETE */
.del{background:none;border:none;cursor:pointer;color:var(--ink3);opacity:.4;font-size:16px;padding:3px 7px;border-radius:5px;transition:opacity .15s,color .15s;line-height:1;}
.del:hover{opacity:1;color:var(--red);}

/* MAP LINK */
.maplink{background:var(--surf2);border:0.5px dashed var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none;color:inherit;transition:background .15s;}
.maplink:hover{background:var(--line2);}

/* CURRENCY SELECTION RESET (MOBILE & PC) */
.curbox{background:var(--surf2);border:0.5px solid var(--line);border-radius:12px;padding:14px;}
.curbox label{font-size:15px;color:var(--ink3);display:block;margin-bottom:4px;font-weight:600;}
.curbox input{
  width:100%;border:none;background:transparent;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--ink);font-weight:500;direction:ltr;
  -webkit-tap-highlight-color: transparent !important;
  -webkit-user-select: all !important;
  user-select: all !important;
}
.curbox input:focus{outline:none;}
.curbox input::selection{background:transparent !important;color:var(--ink) !important;}
.curbox input::-moz-selection{background:transparent !important;color:var(--ink) !important;}
.curbox input::-webkit-selection{background:transparent !important;color:var(--ink) !important;}
.curbox input:focus,.curbox input:focus-visible{outline:none !important;box-shadow:none !important;}
.cursym{font-size:14px;font
